# Daily GA4 + GSC sync via Composio REST API.
#
# Runs from GitHub-hosted runner so we don't depend on anyone's laptop
# being on. ~30 sec per run, well inside the free 2000 min/month quota.
#
# To trigger manually: Actions tab -> Sync URL Metrics -> Run workflow.
# Secrets required in repo Settings -> Secrets and variables -> Actions:
#   - NEXT_PUBLIC_SUPABASE_URL
#   - SUPABASE_SERVICE_ROLE_KEY
#   - COMPOSIO_API_KEY

name: Sync URL Metrics

on:
  schedule:
    # 10:00 AM Asia/Kolkata = 04:30 UTC, Monday through Friday.
    # Cron format: minute hour day-of-month month day-of-week
    - cron: "30 4 * * 1-5"

  # Lets us trigger manually from the Actions tab for debugging or backfill.
  workflow_dispatch:

jobs:
  sync:
    name: Pull GSC + GA4 metrics
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run sync script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          COMPOSIO_ENTITY_ID: lawrance
        run: npx tsx scripts/composio/sync-url-metrics.ts
